<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="よていクエスト">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>よていクエスト Ver.6</title>
<style>
:root{
  --bg:#080808;--panel:#050505;--white:#fff7dc;--muted:#d0c6b0;
  --line:#e6d7b3;--danger:#702530;--accent:#432d5d;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--white)}
body{font-family:"Courier New","Hiragino Kaku Gothic ProN","Yu Gothic",monospace;image-rendering:pixelated}
button,input,textarea{font:inherit}
.app{width:min(100%,760px);margin:auto;padding:calc(6px + env(safe-area-inset-top)) 6px calc(18px + env(safe-area-inset-bottom))}
.screen{display:none}.screen.active{display:block}
.pixel-window{
  background:var(--panel);border:4px solid var(--line);outline:3px solid #000;
  box-shadow:inset 0 0 0 3px #665e50,6px 6px 0 rgba(0,0,0,.45);border-radius:5px
}
.image-wrap{position:relative}
.bg-image{display:block;width:100%;height:auto;border:4px solid #000}
.hotspot{position:absolute;border:0;background:transparent;cursor:pointer;border-radius:10px}
.hotspot:active{background:rgba(255,255,255,.12)}
/* home building hotspots */
.hs-home{left:5%;top:16%;width:25%;height:20%}
.hs-study{left:35%;top:15%;width:29%;height:21%}
.hs-calendar{left:69%;top:15%;width:27%;height:21%}
.hs-work{left:4%;top:39%;width:29%;height:22%}
.hs-recipe{left:64%;top:39%;width:32%;height:24%}
.hs-family{left:4%;top:62%;width:29%;height:20%}
.hs-settings{left:35%;top:61%;width:30%;height:23%}
/* restaurant category hotspots in background */
.hs-main{left:2%;bottom:2%;width:31%;height:35%}
.hs-side{left:34.5%;bottom:2%;width:31%;height:35%}
.hs-soup{left:67%;bottom:2%;width:31%;height:35%}

.header{display:grid;grid-template-columns:46px 1fr 46px;gap:8px;align-items:center;padding:10px;margin-bottom:10px}
.back-btn{height:40px;color:var(--white);background:#161616;border:3px solid var(--line);outline:2px solid #000}
.title{text-align:center;font-size:18px;font-weight:bold}
.memo-panel{padding:12px;margin-top:10px}
.memo-panel h2{margin:0 0 10px;font-size:18px}
.card{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;margin:8px 0;background:#111;border:2px solid #7f7565}
.card-date{font-size:12px;color:#e6cf7d}.card-title{font-size:15px}.card-note{font-size:12px;color:var(--muted);white-space:pre-wrap;margin-top:4px}
.empty{padding:14px 0;color:var(--muted)}
.main-btn,.small-btn,.dialog-btn{
  color:var(--white);background:#1b1027;border:3px solid var(--line);outline:2px solid #000
}
.main-btn{width:100%;padding:12px;margin-top:10px;font-weight:bold}
.small-btn{padding:5px 7px;font-size:11px}.small-btn.danger{background:var(--danger)}
.modal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.82);display:none;align-items:flex-end;justify-content:center;padding:12px}
.modal.show{display:flex}
.modal-card{width:min(100%,620px);padding:14px;max-height:92vh;overflow:auto}
.modal-card h2{margin:0 0 12px}
label{display:block;margin:9px 0 4px;color:var(--muted);font-size:12px}
input,textarea{width:100%;padding:10px;color:var(--white);background:#111;border:2px solid #81796b}
textarea{min-height:110px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.dialog-btn{padding:11px}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:9px 12px;background:#050505;border:3px solid var(--line);display:none;z-index:60}
.toast.show{display:block}
</style>
</head>
<body>
<div class="app">

<section id="homeScreen" class="screen active">
  <div class="image-wrap">
    <img class="bg-image" src="./town-map.png" alt="よていタウン">
    <button class="hotspot hs-home" aria-label="今日の予定"></button>
    <button class="hotspot hs-study" aria-label="勉強記録"></button>
    <button class="hotspot hs-calendar" aria-label="カレンダー"></button>
    <button class="hotspot hs-work" aria-label="仕事メモ"></button>
    <button class="hotspot hs-recipe" id="openRestaurant" aria-label="レストラン"></button>
    <button class="hotspot hs-family" aria-label="子どもの予定"></button>
    <button class="hotspot hs-settings" aria-label="設定"></button>
  </div>
</section>

<section id="restaurantScreen" class="screen">
  <div class="pixel-window header">
    <button class="back-btn" id="backHome">←</button>
    <div class="title">レストラン</div>
    <span></span>
  </div>

  <div class="image-wrap">
    <img class="bg-image" src="./restaurant-map.png" alt="レストラン">
    <button class="hotspot hs-main" data-category="main" aria-label="メイン"></button>
    <button class="hotspot hs-side" data-category="side" aria-label="副菜"></button>
    <button class="hotspot hs-soup" data-category="soup" aria-label="汁物"></button>
  </div>
</section>

<section id="memoScreen" class="screen">
  <div class="pixel-window header">
    <button class="back-btn" id="backRestaurant">←</button>
    <div class="title" id="memoTitle">メインのメモ</div>
    <span></span>
  </div>

  <div class="pixel-window memo-panel">
    <div id="memoList"></div>
    <button class="main-btn" id="addMemo">▶ あたらしく メモする</button>
  </div>
</section>

</div>

<div class="modal" id="memoModal">
  <div class="pixel-window modal-card">
    <h2 id="modalTitle">レシピメモ</h2>
    <form id="memoForm">
      <label>日付</label>
      <input type="date" id="memoDate" required>
      <label>料理名</label>
      <input type="text" id="memoName" required>
      <label>材料・作り方・メモ</label>
      <textarea id="memoText"></textarea>
      <div class="actions">
        <button type="button" class="dialog-btn" id="cancelMemo">キャンセル</button>
        <button type="submit" class="dialog-btn">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const KEY="yq_recipes_v6";
let recipes=JSON.parse(localStorage.getItem(KEY)||"[]");
let category="main";

function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function uid(){
  return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random());
}
function save(){localStorage.setItem(KEY,JSON.stringify(recipes))}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function show(id){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo(0,0);
}
function toast(t){
  $("toast").textContent=t;
  $("toast").classList.add("show");
  setTimeout(()=>$("toast").classList.remove("show"),1500);
}

$("openRestaurant").onclick=()=>show("restaurantScreen");
$("backHome").onclick=()=>show("homeScreen");
$("backRestaurant").onclick=()=>show("restaurantScreen");

document.querySelectorAll("[data-category]").forEach(btn=>{
  btn.onclick=()=>{
    category=btn.dataset.category;
    renderMemos();
    show("memoScreen");
  };
});

function renderMemos(){
  const labels={main:"メイン",side:"副菜",soup:"汁物"};
  $("memoTitle").textContent=`${labels[category]}のメモ`;
  const list=recipes.filter(r=>r.category===category).slice().reverse();
  const el=$("memoList");
  el.innerHTML=list.length?"":"<div class='empty'>まだ メモが ありません。</div>";
  list.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div>
        <div class="card-date">${esc(item.date)}</div>
        <div class="card-title">${esc(item.name)}</div>
        ${item.text?`<div class="card-note">${esc(item.text)}</div>`:""}
      </div>
      <div><button class="small-btn danger">けす</button></div>`;
    card.querySelector("button").onclick=()=>{
      if(confirm("このメモを けしますか？")){
        recipes=recipes.filter(x=>x.id!==item.id);
        save();
        renderMemos();
      }
    };
    el.appendChild(card);
  });
}

$("addMemo").onclick=()=>{
  const labels={main:"メイン",side:"副菜",soup:"汁物"};
  $("modalTitle").textContent=`${labels[category]}のレシピメモ`;
  $("memoDate").value=today();
  $("memoName").value="";
  $("memoText").value="";
  $("memoModal").classList.add("show");
};
$("cancelMemo").onclick=()=>$("memoModal").classList.remove("show");
$("memoForm").onsubmit=e=>{
  e.preventDefault();
  recipes.push({
    id:uid(),
    category,
    date:$("memoDate").value,
    name:$("memoName").value.trim(),
    text:$("memoText").value.trim()
  });
  save();
  $("memoModal").classList.remove("show");
  renderMemos();
  toast("保存しました。");
};

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>
