<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="よていクエスト">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./assets/icons/icon-180.png">
<link rel="stylesheet" href="./css/style.css">
<title>よていクエスト v1.0.0</title>
</head>
<body>
<div class="app">
  <section id="homeScreen" class="screen active">
    <div class="home-wrap">
      <img class="town-image" src="./assets/images/town-map.png" alt="よていタウン">
      <button class="hotspot hs-home" data-screen="todayScreen" aria-label="今日の予定"></button>
      <button class="hotspot hs-study" data-screen="studyScreen" aria-label="勉強記録"></button>
      <button class="hotspot hs-calendar" data-screen="calendarScreen" aria-label="月間カレンダー"></button>
      <button class="hotspot hs-work" data-screen="workScreen" aria-label="仕事メモ"></button>
      <button class="hotspot hs-recipe" data-screen="recipeScreen" aria-label="献立・レシピメモ"></button>
      <button class="hotspot hs-family" data-screen="familyScreen" aria-label="子どもの予定"></button>
      <button class="hotspot hs-reading" data-screen="readingScreen" aria-label="読書記録"></button>
    </div>
  </section>

  <section id="recipeScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn" id="recipeBackHome">←</button><div class="screen-title">レストラン</div><span></span></div>
    <div class="restaurant-wrap">
      <img class="restaurant-image" src="./assets/images/restaurant-map.png" alt="レストラン">
      <button class="hotspot hs-main" data-recipe-category="main" aria-label="メイン"></button>
      <button class="hotspot hs-side" data-recipe-category="side" aria-label="副菜"></button>
      <button class="hotspot hs-soup" data-recipe-category="soup" aria-label="汁物"></button>
    </div>
  </section>

  <section id="recipeListScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn" id="recipeBackRestaurant">←</button><div class="screen-title" id="recipeListTitle">メインのメモ</div><span></span></div>
    <div class="pixel-window content">
      <div id="recipeList"></div>
      <button class="main-btn" id="addRecipe">▶ あたらしく メモする</button>
    </div>
  </section>

  <section id="calendarScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">月間カレンダー</div><span></span></div>
    <div class="pixel-window content">
      <div class="month-row"><button class="icon-btn" id="prevMonth">◀</button><div class="month-title" id="monthTitle"></div><button class="icon-btn" id="nextMonth">▶</button></div>
      <div class="weekdays"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
      <div class="days" id="calendarDays"></div>
    </div>
    <div class="pixel-window content" style="margin-top:12px"><h2 id="detailTitle"></h2><div id="eventList"></div><button class="main-btn" id="addEvent">▶ よていを とうろく</button></div>
  </section>

  <section id="todayScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">今日の予定</div><span></span></div>
    <div class="pixel-window content"><h2>きょうの クエスト</h2><div id="todayList"></div><button class="main-btn" data-screen="calendarScreen">月間カレンダーを ひらく</button></div>
  </section>

  <section id="studyScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">勉強記録</div><span></span></div>
    <div class="pixel-window content"><div class="stats"><div class="stat"><strong id="studyTotal">0</strong>分</div><div class="stat"><strong id="studyCount">0</strong>回</div></div><div id="studyList"></div><button class="main-btn" id="addStudy">▶ 勉強を記録</button><button class="main-btn" data-screen="readingScreen">読書記録を ひらく</button></div>
  </section>

  <section id="readingScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">読書記録</div><span></span></div>
    <div class="pixel-window content"><h2>100冊クエスト</h2><div class="progress"><span id="readingProgress"></span></div><div class="stats"><div class="stat"><strong id="readingCount">0</strong>冊</div><div class="stat"><strong>100</strong>目標</div></div><div id="readingList"></div><button class="main-btn" id="addBook">▶ 本を登録</button></div>
  </section>

  <section id="workScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">仕事メモ</div><span></span></div>
    <div class="pixel-window content"><div id="workList"></div><button class="main-btn" id="addWork">▶ アイデアを登録</button></div>
  </section>

  <section id="familyScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">子どもの予定</div><span></span></div>
    <div class="pixel-window content"><div id="familyList"></div><button class="main-btn" id="addFamily">▶ 予定を登録</button></div>
  </section>

  <section id="settingsScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">データ管理</div><span></span></div>
    <div class="pixel-window content">
      <h2>セーブデータ</h2>
      <div class="data-info">
        アプリ v1.0.0<br>
        データ形式：Schema <strong id="schemaVersionLabel">1</strong><br>
        最終バックアップ：<span id="lastBackupLabel">まだありません</span>
      </div>
      <div class="data-actions">
        <button class="main-btn" id="exportBackup">💾 バックアップを書き出す</button>
        <button class="main-btn" id="importBackup">📥 バックアップを読み込む</button>
        <input class="file-input" id="backupFile" type="file" accept="application/json,.json">
        <button class="main-btn" id="repairData">🛠 旧データを確認・修復する</button>
      </div>
      <p class="data-info">バックアップは予定・献立・勉強・読書・仕事・子どもの予定を1つのJSONファイルに保存します。読み込み時は現在のデータを置き換えます。</p>
    </div>
  </section>
</div>


<nav class="bottom-nav">
  <button class="nav-btn" data-screen="homeScreen"><strong>🏠</strong>ホーム</button>
  <button class="nav-btn" data-screen="calendarScreen"><strong>📅</strong>予定</button>
  <button class="nav-btn" data-screen="recipeScreen"><strong>🍽️</strong>献立</button>
  <button class="nav-btn" data-screen="studyScreen"><strong>📚</strong>勉強</button>
  <button class="nav-btn" data-screen="readingScreen"><strong>📖</strong>読書</button>
  <button class="nav-btn" data-screen="workScreen"><strong>📝</strong>仕事</button>
  <button class="nav-btn" data-screen="settingsScreen"><strong>⚙️</strong>設定</button>
</nav>

<div class="modal" id="genericModal">
  <div class="pixel-window modal-card">
    <h2 id="modalTitle"></h2>
    <form id="genericForm"><div id="modalFields"></div><div class="modal-actions"><button type="button" class="dialog-btn" id="cancelModal">キャンセル</button><button type="submit" class="dialog-btn">とうろく</button></div></form>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="./js/migration.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/backup.js"></script>
<script src="./js/sound.js"></script>
<script src="./js/animation.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
