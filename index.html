<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="よていクエスト">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>よていクエスト v1.1.3</title>
<style>
:root{
  --bg:#080808;--panel:#050505;--white:#fff8dc;--muted:#cfc8b8;
  --line:#e8dec5;--gold:#cbb88a;--purple:#56347a;--danger:#6b2430;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--white)}
body{
  font-family:"Courier New","Hiragino Kaku Gothic ProN","Yu Gothic",monospace;
  image-rendering:pixelated;
}
button,input,textarea,select{font:inherit}
button{touch-action:manipulation}
.app{
  width:min(100%,760px);margin:0 auto;
  padding:calc(6px + env(safe-area-inset-top)) 6px calc(92px + env(safe-area-inset-bottom));
}
.screen{display:none}.screen.active{display:block}
.pixel-window{
  background:var(--panel);
  border:4px solid var(--line);
  outline:3px solid #000;
  box-shadow:inset 0 0 0 3px #675f52,6px 6px 0 rgba(0,0,0,.5);
  border-radius:5px;
}
.home-wrap{position:relative}
.town-image{display:block;width:100%;height:auto;border:4px solid #000}
.hotspot{
  position:absolute;border:0;background:transparent;cursor:pointer;
  border-radius:8px;
}
.hotspot:active{background:rgba(255,255,255,.12)}
 .hs-home{left:5%;top:16%;width:25%;height:20%}
.hs-study{left:35%;top:15%;width:29%;height:21%}
.hs-calendar{left:69%;top:15%;width:27%;height:21%}
.hs-work{left:4%;top:39%;width:29%;height:22%}
.hs-recipe{left:64%;top:39%;width:32%;height:24%}
.hs-family{left:4%;top:62%;width:29%;height:20%}
.hs-reading{left:35%;top:61%;width:30%;height:23%}


.world-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;border:4px solid transparent}

.tree-wind-layer{display:none}
.leaf-particles{position:absolute;inset:0;overflow:hidden}
.leaf-particle{
  position:absolute;width:5px;height:3px;border-radius:60% 20% 60% 20%;
  background:#9da93d;opacity:.75;filter:drop-shadow(1px 1px 0 rgba(20,40,10,.45));
  animation:leaf-fall var(--leaf-duration,6s) linear infinite;
  animation-delay:var(--leaf-delay,0s);
  transform:translate3d(0,-8px,0) rotate(0deg)
}
@keyframes leaf-fall{
  0%{transform:translate3d(0,-8px,0) rotate(0deg);opacity:0}
  12%{opacity:.8}
  55%{transform:translate3d(var(--leaf-drift,16px),70px,0) rotate(190deg);opacity:.72}
  100%{transform:translate3d(calc(var(--leaf-drift,16px) * -0.35),145px,0) rotate(390deg);opacity:0}
}
.river-light-layer{
  position:absolute;inset:0;width:100%;height:100%;object-fit:fill;
  image-rendering:pixelated;
  animation:river-twinkle 2.2s steps(4,end) infinite;
  mix-blend-mode:screen;
}
@keyframes river-twinkle{
  0%,100%{opacity:.18;filter:brightness(.95)}
  25%{opacity:.62;filter:brightness(1.35)}
  50%{opacity:.28;filter:brightness(1.05)}
  75%{opacity:.78;filter:brightness(1.5)}
}
html[data-animations="off"] .world-layer{display:none}
html[data-time-phase="morning"] .town-image{filter:sepia(.08) brightness(1.06) saturate(1.03)}
html[data-time-phase="evening"] .town-image{filter:sepia(.28) hue-rotate(-12deg) saturate(1.17) brightness(.9)}
html[data-time-phase="night"] .town-image{filter:brightness(.58) saturate(.82) hue-rotate(8deg)}
html[data-time-phase="night"] .world-layer::after{
  content:"";position:absolute;inset:0;background:radial-gradient(circle at 72% 12%,rgba(255,249,195,.22),transparent 12%);
}
.audio-unlock{
  position:fixed;z-index:95;left:50%;top:calc(12px + env(safe-area-inset-top));transform:translateX(-50%);
  background:#050505;color:var(--white);border:3px solid var(--line);outline:2px solid #000;
  padding:8px 12px;font-size:12px;display:none
}
.audio-unlock.show{display:block}

.header{display:grid;grid-template-columns:46px 1fr 46px;align-items:center;gap:8px;padding:10px;margin-bottom:12px}
.back-btn,.icon-btn{height:40px;color:var(--white);background:#151515;border:3px solid var(--line);outline:2px solid #000}
.screen-title{text-align:center;font-size:18px;font-weight:bold}
.content{padding:12px}
.content h2{margin:0 0 12px;font-size:18px}
.main-btn,.small-btn,.dialog-btn{
  color:var(--white);background:#1b1027;border:3px solid var(--line);outline:2px solid #000
}
.main-btn{width:100%;padding:12px;margin-top:12px;font-weight:bold}
.small-btn{padding:5px 7px;font-size:11px}.small-btn.danger{background:var(--danger)}
.card{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;margin:8px 0;background:#101010;border:2px solid #807868}
.card-meta{font-size:12px;color:#e7d68b}.card-title{font-size:15px}.card-note{font-size:12px;color:var(--muted);margin-top:4px;white-space:pre-wrap}
.empty{padding:14px 2px;color:var(--muted)}
.month-row{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;align-items:center;margin-bottom:10px}
.month-title{text-align:center;font-size:18px}
.weekdays,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.weekdays div{text-align:center;padding:5px 0;font-size:11px;color:var(--muted)}
.day{min-height:58px;color:var(--white);background:#101010;border:2px solid #686154;padding:4px 3px;overflow:hidden}
.day.today{border-color:#f1d971}.day.selected{background:#2f1d44;border-color:var(--line)}
.day-number{font-size:13px;font-weight:bold}
.event-dot{display:block;font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;padding:2px;background:#20172c;border-left:3px solid #d676c8}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat{padding:10px;text-align:center;background:#111;border:2px solid #766e60}
.stat strong{display:block;font-size:22px;color:#f0d679}
.progress{height:18px;background:#171717;border:2px solid #766e60;margin:8px 0}
.progress span{display:block;height:100%;background:linear-gradient(90deg,#4b2d6c,#d676c8)}

.restaurant-wrap{position:relative}
.restaurant-image{display:block;width:100%;height:auto;border:4px solid #000}
.hs-main{left:2%;bottom:2%;width:31%;height:35%}
.hs-side{left:34.5%;bottom:2%;width:31%;height:35%}
.hs-soup{left:67%;bottom:2%;width:31%;height:35%}
.recipe-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.recipe-head h2{margin:0}


.library-scene{position:relative}
.library-image{display:block;width:100%;height:auto;border:4px solid #000;image-rendering:pixelated}
.library-choice{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:12px;margin-top:10px}
.library-choice-btn{
  min-height:128px;color:var(--white);background:linear-gradient(180deg,#21170d,#120d08);border:3px solid var(--line);
  outline:2px solid #000;text-align:center;padding:14px 10px;font-size:13px;line-height:1.55
}
.library-choice-btn strong{display:block;font-size:20px;margin-bottom:9px}
.settings-scene{position:relative;margin-bottom:10px}
.settings-room{display:block;width:100%;height:190px;object-fit:cover;object-position:center 62%;border:4px solid #000;image-rendering:pixelated;filter:sepia(.12) brightness(.7)}
.settings-room::after{content:""}
.settings-panel{padding:12px;background:linear-gradient(180deg,#0b0906,#050505)}
.settings-intro{padding:12px;margin-bottom:10px;background:#11100d;border:2px solid #75633f;color:#efe4c9;line-height:1.6}
.setting-row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;min-height:68px;padding:10px 12px;margin:8px 0;background:#19150f;border:2px solid #806a43;box-shadow:inset 0 0 0 2px #2b2418}
.setting-icon{font-size:25px;text-align:center}.setting-label{font-size:15px}.setting-sub{display:block;font-size:10px;color:#cfc2a4;margin-top:2px}
.volume-wrap{display:grid;grid-template-columns:minmax(110px,1fr) 42px;align-items:center;gap:8px;min-width:170px}
.volume-slider{appearance:none;width:100%;height:7px;border:0;background:linear-gradient(90deg,#2876d7 var(--value,70%),#353535 var(--value,70%));outline:none;padding:0}
.volume-slider::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:#dfc28c;border:2px solid #6d5633}
.volume-value{text-align:right;color:#ead8ad;font-size:12px}
.switch{position:relative;width:68px;height:34px;border:2px solid #6d5b39;border-radius:18px;background:#3a3a34;color:#fff;cursor:pointer}.switch.on{background:#287b2c}.switch::after{content:"";position:absolute;top:3px;left:4px;width:24px;height:24px;border-radius:50%;background:#e7d5aa;transition:.18s}.switch.on::after{left:36px}.switch span{position:absolute;left:9px;top:6px;font-size:11px}.switch.on span{left:9px}
.settings-action{width:100%;display:grid;grid-template-columns:42px 1fr 24px;align-items:center;gap:8px;text-align:left;padding:14px 12px;margin:8px 0;color:var(--white);background:#19150f;border:2px solid #806a43;outline:0}.settings-action .arrow{text-align:right;font-size:22px;color:#dfc28c}
.settings-details{margin-top:12px;padding-top:10px;border-top:2px solid #5d513b}
.settings-details summary{cursor:pointer;padding:10px;color:#e3d5b6}

.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.8);display:none;align-items:flex-end;justify-content:center;padding:12px}
.modal.show{display:flex}
.modal-card{width:min(100%,620px);padding:14px;max-height:92vh;overflow:auto}
.modal-card h2{margin:0 0 12px}
label{display:block;margin:9px 0 4px;color:var(--muted);font-size:12px}
input,textarea,select{width:100%;padding:10px;color:var(--white);background:#111;border:2px solid #81796b}
textarea{min-height:78px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.dialog-btn{padding:11px}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:80;padding:9px 12px;background:#050505;border:3px solid var(--line);display:none}
.toast.show{display:block}
.data-actions{display:grid;gap:10px}.data-info{line-height:1.8;color:var(--muted);font-size:13px}.danger-btn{background:#652431}.file-input{display:none}

.bottom-nav{
  position:fixed;z-index:30;left:50%;bottom:0;transform:translateX(-50%);
  width:min(100%,760px);padding:7px 8px calc(7px + env(safe-area-inset-bottom));
  display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#090909;border-top:3px solid var(--line)
}
.nav-btn{min-height:58px;color:var(--white);background:#0c0c0c;border:3px solid var(--line);outline:2px solid #000;font-size:9px;border-radius:4px}
.nav-btn strong{display:block;font-size:21px;margin-bottom:2px}
@media(max-width:520px){
  .title-box{font-size:17px}.status-box{font-size:12px}
  .form-grid{grid-template-columns:1fr}
  .bottom-nav{grid-template-columns:repeat(7,minmax(62px,1fr));overflow-x:auto}
  .library-choice{grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;padding:8px}
  .library-choice-btn{min-height:120px;padding:12px 6px;font-size:12px}
  .library-choice-btn strong{font-size:17px}
  .setting-row{grid-template-columns:34px 1fr;padding:10px}
  .setting-row .volume-wrap,.setting-row .switch{grid-column:2}
  .volume-wrap{min-width:0;width:100%}
}
</style>
</head>
<body>
<div class="app">
  <section id="homeScreen" class="screen active">
    <div class="home-wrap">
      <img class="town-image" src="./town-map.png" alt="よていタウン">
      <div class="world-layer" aria-hidden="true">
        <div class="leaf-particles" id="leafParticles"></div>
        <img class="river-light-layer" src="./river-light.png" alt="">
      </div>
      <button class="hotspot hs-home" data-screen="todayScreen" aria-label="今日の予定"></button>
      <button class="hotspot hs-study" data-screen="libraryScreen" aria-label="勉強記録"></button>
      <button class="hotspot hs-calendar" data-screen="settingsScreen" aria-label="役場・設定"></button>
      <button class="hotspot hs-work" data-screen="workScreen" aria-label="仕事メモ"></button>
      <button class="hotspot hs-recipe" data-screen="recipeScreen" aria-label="献立・レシピメモ"></button>
      <button class="hotspot hs-family" data-screen="familyScreen" aria-label="子どもの予定"></button>
    </div>
  </section>

  <section id="recipeScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn" id="recipeBackHome">←</button><div class="screen-title">レストラン</div><span></span></div>
    <div class="restaurant-wrap">
      <img class="restaurant-image" src="./restaurant-map.png" alt="レストラン">
      <button class="hotspot hs-main" data-recipe-category="main" aria-label="メイン"></button>
      <button class="hotspot hs-side" data-recipe-category="side" aria-label="副菜"></button>
      <button class="hotspot hs-soup" data-recipe-category="soup" aria-label="汁物"></button>
    </div>
  </section>

  <section id="recipeListScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn" id="recipeBackRestaurant">←</button><div class="screen-title" id="recipeListTitle">メインのメモ</div><span></span></div>
    <div class="pixel-window content">
      <div id="recipeList"></div>
      <button class="main-btn" id="addRecipe">▶ あたらしく メモする</button>
    </div>
  </section>

  <section id="calendarScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">月間カレンダー</div><span></span></div>
    <div class="pixel-window content">
      <div class="month-row"><button class="icon-btn" id="prevMonth">◀</button><div class="month-title" id="monthTitle"></div><button class="icon-btn" id="nextMonth">▶</button></div>
      <div class="weekdays"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
      <div class="days" id="calendarDays"></div>
    </div>
    <div class="pixel-window content" style="margin-top:12px"><h2 id="detailTitle"></h2><div id="eventList"></div><button class="main-btn" id="addEvent">▶ よていを とうろく</button></div>
  </section>

  <section id="todayScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">今日の予定</div><span></span></div>
    <div class="pixel-window content"><h2>きょうの クエスト</h2><div id="todayList"></div><button class="main-btn" data-screen="calendarScreen">月間カレンダーを ひらく</button></div>
  </section>

  <section id="libraryScreen" class="screen">
  <div class="pixel-window header">
    <button class="back-btn" data-screen="homeScreen">←</button>
    <div class="title">図書館</div><span></span>
  </div>
  <div class="library-scene">
    <img class="library-image" src="./library-map.png" alt="図書館">
  </div>
  <div class="pixel-window library-choice">
    <button class="library-choice-btn" data-screen="studyScreen">
      <strong>📚 勉強記録</strong>勉強した時間と内容を記録する
    </button>
    <button class="library-choice-btn" data-screen="readingScreen">
      <strong>📖 読書記録</strong>読んだ本を記録する
    </button>
  </div>
</section>

<section id="studyScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">勉強記録</div><span></span></div>
    <div class="pixel-window content"><div class="stats"><div class="stat"><strong id="studyTotal">0</strong>分</div><div class="stat"><strong id="studyCount">0</strong>回</div></div><div id="studyList"></div><button class="main-btn" id="addStudy">▶ 勉強を記録</button><button class="main-btn" data-screen="readingScreen">読書記録を ひらく</button></div>
  </section>

  <section id="readingScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">読書記録</div><span></span></div>
    <div class="pixel-window content"><h2>100冊クエスト</h2><div class="progress"><span id="readingProgress"></span></div><div class="stats"><div class="stat"><strong id="readingCount">0</strong>冊</div><div class="stat"><strong>100</strong>目標</div></div><div id="readingList"></div><button class="main-btn" id="addBook">▶ 本を登録</button></div>
  </section>

  <section id="workScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">仕事メモ</div><span></span></div>
    <div class="pixel-window content"><div id="workList"></div><button class="main-btn" id="addWork">▶ アイデアを登録</button></div>
  </section>

  <section id="familyScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn">←</button><div class="screen-title">子どもの予定</div><span></span></div>
    <div class="pixel-window content"><div id="familyList"></div><button class="main-btn" id="addFamily">▶ 予定を登録</button></div>
  </section>

  <section id="settingsScreen" class="screen">
    <div class="pixel-window header"><button class="back-btn" data-screen="homeScreen">←</button><div class="screen-title">設定（役場）</div><span></span></div>
    <div class="settings-scene"><img class="settings-room" src="./library-map.png" alt="役場の室内"></div>
    <div class="pixel-window settings-panel">
      <div class="settings-intro">設定やデータの管理を行います。</div>
      <div class="setting-row">
        <div class="setting-icon">🎵</div><div class="setting-label">BGMの音量<span class="setting-sub">街のBGMを調節します</span></div>
        <div class="volume-wrap"><input class="volume-slider" id="bgmVolume" type="range" min="0" max="100" step="1"><span class="volume-value" id="bgmVolumeValue">70%</span></div>
      </div>
      <div class="setting-row">
        <div class="setting-icon">🔊</div><div class="setting-label">効果音の音量<span class="setting-sub">ボタン操作音を調節します</span></div>
        <div class="volume-wrap"><input class="volume-slider" id="effectVolume" type="range" min="0" max="100" step="1"><span class="volume-value" id="effectVolumeValue">70%</span></div>
      </div>
      <div class="setting-row">
        <div class="setting-icon">🖥️</div><div class="setting-label">街の演出<span class="setting-sub">落ち葉エフェクトのON/OFF</span></div>
        <button class="switch on" id="toggleAnimations" type="button"><span>ON</span></button>
      </div>
      <button class="settings-action" id="exportBackup"><span>☁️</span><span>データのバックアップ</span><span class="arrow">›</span></button>
      <button class="settings-action" id="importBackup"><span>📥</span><span>バックアップから復元</span><span class="arrow">›</span></button>
      <input class="file-input" id="backupFile" type="file" accept="application/json,.json">
      <button class="settings-action danger" id="resetData"><span>🗑️</span><span>データのリセット</span><span class="arrow">›</span></button>
      <details class="settings-details">
        <summary>詳細なデータ管理</summary>
        <div class="data-info">
          アプリ v1.1.3／Schema <strong id="schemaVersionLabel">1</strong><br>
          最終手動バックアップ：<span id="lastBackupLabel">まだありません</span><br>
          最終自動保存：<span id="lastAutoBackupLabel">まだありません</span><br>
          保存データ状態：<span id="dataHealthLabel">確認中</span>
        </div>
        <button class="main-btn" id="restoreAutoBackup">↩️ 直前の自動保存に戻す</button>
        <button class="main-btn" id="repairData">🛠 旧データを確認・修復する</button>
        <button class="main-btn" id="checkDataHealth">🔎 保存データを点検する</button>
      </details>
    </div>
  </section>
</div>


<nav class="bottom-nav">
  <button class="nav-btn" data-screen="homeScreen"><strong>🏠</strong>ホーム</button>
  <button class="nav-btn" data-screen="calendarScreen"><strong>📅</strong>予定</button>
  <button class="nav-btn" data-screen="recipeScreen"><strong>🍽️</strong>献立</button>
  <button class="nav-btn" data-screen="studyScreen"><strong>📚</strong>勉強</button>
  <button class="nav-btn" data-screen="readingScreen"><strong>📖</strong>読書</button>
  <button class="nav-btn" data-screen="workScreen"><strong>📝</strong>仕事</button>
  <button class="nav-btn" data-screen="settingsScreen"><strong>⚙️</strong>設定</button>
</nav>

<div class="modal" id="genericModal">
  <div class="pixel-window modal-card">
    <h2 id="modalTitle"></h2>
    <form id="genericForm"><div id="modalFields"></div><div class="modal-actions"><button type="button" class="dialog-btn" id="cancelModal">キャンセル</button><button type="submit" class="dialog-btn">とうろく</button></div></form>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="audio-unlock" id="audioUnlock">🔊 タップして音を有効にする</button>

<script>
const $=id=>document.getElementById(id);
const APP_VERSION="1.1.3";
const SCHEMA_VERSION=1;
const MASTER_KEY="yoteiquest_data_v1";
const AUTO_BACKUP_KEY="yoteiquest_auto_backup_v1";
const AUTO_BACKUP_TIME_KEY="yoteiquest_auto_backup_time_v1";
const OLD_MASTER_KEYS=["yoteiQuestData"];
const LEGACY_KEYS={
  events:"yq_events_v2",study:"yq_study_v2",books:"yq_books_v2",
  work:"yq_work_v2",family:"yq_family_v2",recipes:"yq_recipes_v4"
};
function safeParse(text,fallback){try{return JSON.parse(text)}catch{return fallback}}
function emptyStore(){return {
  schemaVersion:SCHEMA_VERSION,
  appVersion:APP_VERSION,
  updatedAt:new Date().toISOString(),
  events:[],study:[],books:[],work:[],family:[],recipes:[],
  todo:[],money:0,inventory:[],room:{items:[]},gacha:{history:[]},
  achievements:[],battle:{answered:0,correct:0},settings:{sound:true,bgm:true,bgmVolume:72,effectVolume:72,animations:true,timeEffects:true}
}}
function migrate(raw){
  if(!raw||typeof raw!=="object") return emptyStore();
  const migrated={...emptyStore(),...raw};
  for(const key of ["events","study","books","work","family","recipes","todo","inventory","achievements"]){if(!Array.isArray(migrated[key])) migrated[key]=[]}
  if(typeof migrated.money!=="number") migrated.money=0;
  if(!migrated.room||typeof migrated.room!=="object") migrated.room={items:[]};
  if(!Array.isArray(migrated.room.items)) migrated.room.items=[];
  if(!migrated.gacha||typeof migrated.gacha!=="object") migrated.gacha={history:[]};
  if(!Array.isArray(migrated.gacha.history)) migrated.gacha.history=[];
  if(!migrated.battle||typeof migrated.battle!=="object") migrated.battle={answered:0,correct:0};
  migrated.settings={sound:true,bgm:true,bgmVolume:72,effectVolume:72,animations:true,timeEffects:true,...(migrated.settings||{})};
  migrated.settings.bgmVolume=Math.max(0,Math.min(100,Number(migrated.settings.bgmVolume??72)));
  migrated.settings.effectVolume=Math.max(0,Math.min(100,Number(migrated.settings.effectVolume??72)));
  migrated.appVersion=APP_VERSION;
  migrated.schemaVersion=SCHEMA_VERSION;
  return migrated;
}
function readLegacy(){
  const legacy=emptyStore();
  for(const [name,key] of Object.entries(LEGACY_KEYS)) legacy[name]=safeParse(localStorage.getItem(key)||"[]",[]);
  return legacy;
}
function loadStore(){
  const master=safeParse(localStorage.getItem(MASTER_KEY)||"null",null);
  if(master) return migrate(master);
  for(const oldKey of OLD_MASTER_KEYS){
    const old=safeParse(localStorage.getItem(oldKey)||"null",null);
    if(old){const moved=migrate(old);localStorage.setItem(MASTER_KEY,JSON.stringify(moved));return moved;}
  }
  const legacy=readLegacy();
  const migrated=migrate(legacy);
  localStorage.setItem(MASTER_KEY,JSON.stringify(migrated));
  return migrated;
}
let data=loadStore();
if(!localStorage.getItem(AUTO_BACKUP_KEY)){
  try{
    localStorage.setItem(AUTO_BACKUP_KEY,JSON.stringify(data));
    localStorage.setItem(AUTO_BACKUP_TIME_KEY,new Date().toISOString());
  }catch{}
}
let viewDate=new Date(),selectedDate=fmt(new Date()),modalMode="",recipeCategory="main";
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function pdate(s){const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function jp(s){const d=pdate(s),w=["日","月","火","水","木","金","土"][d.getDay()];return `${d.getFullYear()}年 ${d.getMonth()+1}月 ${d.getDate()}日（${w}）`}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function createAutoSnapshot(){
  try{
    const current=localStorage.getItem(MASTER_KEY);
    if(current){
      localStorage.setItem(AUTO_BACKUP_KEY,current);
      localStorage.setItem(AUTO_BACKUP_TIME_KEY,new Date().toISOString());
    }
  }catch{}
}
function persistAll(){
  createAutoSnapshot();
  data=migrate(data);
  data.schemaVersion=SCHEMA_VERSION;
  data.appVersion=APP_VERSION;
  data.updatedAt=new Date().toISOString();
  const serialized=JSON.stringify(data);
  localStorage.setItem(MASTER_KEY,serialized);
  for(const [name,key] of Object.entries(LEGACY_KEYS)){
    localStorage.setItem(key,JSON.stringify(data[name]||[]));
  }
}
function save(k){persistAll()}
function toast(t){$("toast").textContent=t;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1500)}

// 共通サウンド基盤：PWAでも最初のユーザー操作で解除し、画面遷移後も同じAudioContextを使う
const SoundEngine=(()=>{
  let ctx=null,master=null,bgmGain=null,bgmTimer=null,bgmStep=0,unlocked=false;
  const melody=[523.25,659.25,783.99,659.25,587.33,698.46,783.99,698.46];
  function context(){
    if(!ctx){
      ctx=new (window.AudioContext||window.webkitAudioContext)();
      master=ctx.createGain();master.gain.value=.42;master.connect(ctx.destination);
      bgmGain=ctx.createGain();bgmGain.gain.value=(Number(data?.settings?.bgmVolume??72)/100)*.16;bgmGain.connect(master);
    }
    return ctx;
  }
  async function unlock(){
    try{
      const c=context();
      if(c.state==="suspended")await c.resume();
      const b=c.createBuffer(1,1,c.sampleRate),s=c.createBufferSource();
      s.buffer=b;s.connect(master);s.start(0);
      unlocked=true;
      $("audioUnlock")?.classList.remove("show");
      if(data?.settings?.bgm!==false)startBgm();
      return true;
    }catch{
      $("audioUnlock")?.classList.add("show");
      return false;
    }
  }
  function tone(freq,dur=.05,vol=.055,type="square",delay=0,destination=master){
    if(!unlocked)return;
    const c=context(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime+delay;
    o.type=type;o.frequency.setValueAtTime(freq,t);
    const effectScale=destination===bgmGain?1:(Number(data?.settings?.effectVolume??72)/100);
    g.gain.setValueAtTime(vol*effectScale,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g);g.connect(destination);o.start(t);o.stop(t+dur+.02);
  }
  function beep(type="cursor"){
    if(data?.settings?.sound===false)return;
    if(!unlocked){$("audioUnlock")?.classList.add("show");return;}
    const map={
      cursor:[[760,.035,.045]],
      confirm:[[880,.045,.05],[1174,.055,.045,.04]],
      save:[[659,.05,.05],[880,.07,.045,.05]],
      cancel:[[360,.06,.05]],
      page:[[540,.04,.04]]
    };
    for(const [freq,dur,vol,delay=0] of (map[type]||map.cursor))tone(freq,dur,vol,"square",delay);
  }
  function scheduleBgmNote(){
    if(!unlocked||data?.settings?.bgm===false||document.hidden)return;
    const freq=melody[bgmStep%melody.length];bgmStep++;
    tone(freq,.19,.038,"square",0,bgmGain);
    if(bgmStep%2===0)tone(freq/2,.14,.022,"triangle",.03,bgmGain);
  }
  function startBgm(){
    if(data?.settings?.bgm===false||!unlocked)return;
    if(bgmTimer)return;
    scheduleBgmNote();
    bgmTimer=setInterval(scheduleBgmNote,420);
  }
  function stopBgm(){
    if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}
  }
  function sync(){
    if(bgmGain)bgmGain.gain.value=(Number(data?.settings?.bgmVolume??72)/100)*.16;
    if(data?.settings?.bgm!==false&&Number(data?.settings?.bgmVolume??72)>0)startBgm();else stopBgm();
  }
  function setVolumes(){if(bgmGain)bgmGain.gain.value=(Number(data?.settings?.bgmVolume??72)/100)*.16;}
  document.addEventListener("visibilitychange",()=>{
    if(document.hidden)stopBgm();
    else if(unlocked&&data?.settings?.bgm!==false){context().resume().then(startBgm).catch(()=>{});}
  });
  window.addEventListener("pageshow",()=>{
    if(unlocked&&data?.settings?.bgm!==false){context().resume().then(startBgm).catch(()=>{});}
  });
  return {unlock,beep,startBgm,stopBgm,sync,setVolumes,isUnlocked:()=>unlocked};
})();

function validateDataStore(store=data){
  const requiredArrays=["events","study","books","work","family","recipes","todo","inventory","achievements"];
  const broken=requiredArrays.filter(k=>!Array.isArray(store?.[k]));
  if(store?.schemaVersion!==SCHEMA_VERSION)broken.push("schemaVersion");
  if(typeof store?.money!=="number")broken.push("money");
  return {ok:broken.length===0,broken};
}
function updateDataInfo(){
  if($("schemaVersionLabel"))$("schemaVersionLabel").textContent=String(data.schemaVersion||SCHEMA_VERSION);
  if($("lastBackupLabel"))$("lastBackupLabel").textContent=localStorage.getItem("yq_last_backup")||"まだありません";
  const autoTime=localStorage.getItem(AUTO_BACKUP_TIME_KEY);
  if($("lastAutoBackupLabel"))$("lastAutoBackupLabel").textContent=autoTime?new Date(autoTime).toLocaleString("ja-JP"):"まだありません";
  const health=validateDataStore();
  if($("dataHealthLabel"))$("dataHealthLabel").textContent=health.ok?"正常":"要修復";
}

  const payload=backupPayload();

    const parsed=JSON.parse(await file.text());

function initLeafParticles(){
  const layer=$("leafParticles");if(!layer||layer.childElementCount)return;
  const positions=[[8,8],[18,4],[29,12],[72,5],[85,11],[92,20],[12,43],[25,38],[78,40],[90,49],[9,67],[22,73],[76,69],[89,76]];
  positions.forEach((pos,i)=>{const leaf=document.createElement("i");leaf.className="leaf-particle";leaf.style.left=`${pos[0]}%`;leaf.style.top=`${pos[1]}%`;leaf.style.setProperty("--leaf-duration",`${5.2+(i%5)*.7}s`);leaf.style.setProperty("--leaf-delay",`${-(i%7)*.8}s`);leaf.style.setProperty("--leaf-drift",`${10+(i%4)*7}px`);if(i%3===1)leaf.style.background="#7f9632";if(i%3===2)leaf.style.background="#b5aa42";layer.appendChild(leaf);});
}
if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));
window.addEventListener("load",()=>{
  initLeafParticles();
  WorldEngine.apply();
  const standalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;
  if(standalone&&data.settings.sound!==false)$("audioUnlock")?.classList.add("show");
});
renderAll();
</script>
